services:
  db:
    image: postgres:16-alpine
    container_name: prueba_fs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prueba_fs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automate migration on first run
      - ./backend/src/db/migrations/001_create_favorites.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prueba_fs"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: prueba_fs_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: prueba_fs
      DB_USER: postgres
      DB_PASSWORD: postgres
      POKEAPI_BASE_URL: https://pokeapi.co/api/v2
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3000
        - VITE_SOCKET_URL=http://localhost:3000
    container_name: prueba_fs_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: