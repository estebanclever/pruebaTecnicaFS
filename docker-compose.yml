services:
  db:
    image: postgres:16-alpine
    container_name: prueba_fs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prueba_fs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: